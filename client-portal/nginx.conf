# <nginx name="client-portal">
#   Serves the built customer portal AND reverse-proxies /api/* to the SAME
#   backend container the company CRM uses. Because the API is same-origin (/api),
#   the browser never hits CORS and the portal needs no hard-coded backend URL.
#
#   The customer session is a bearer token in the portal's own localStorage (the
#   app never sends cookies), so even though both web apps talk to one backend,
#   the staff and customer sessions never share a cookie jar.
# </nginx>
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Customer BFF + shared API -> backend service on the internal Docker network.
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 30m;
    }

    # A couple of light hardening headers for the customer app.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Single-page app: every other path falls back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
