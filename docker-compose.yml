# =============================================================================
# <compose name="Interio Junction CRM">
#   One command brings up the whole CRM: PostgreSQL + API + web UI.
#
#   Quick start (on a server that has Docker):
#     1) create a file named  .env  next to this file (see DEPLOYMENT.md)
#     2) run:   docker compose up -d --build
#     3) open:  http://YOUR_SERVER_IP/      (login admin@interiojunction.com)
#
#   Using your OWN PostgreSQL instead of the bundled one?
#     - set DATABASE_URL in .env to your database, and
#     - delete (or comment out) the whole `db:` service below + `depends_on: db`.
# </compose>
# =============================================================================
services:

  # <service name="db"> Bundled PostgreSQL. pgAdmin can connect to it on port 5432. </service>
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-db-password}
      POSTGRES_DB: ${POSTGRES_DB:-interio_crm}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Exposes the DB so you can connect pgAdmin from your laptop.
      # SECURITY: keep a strong POSTGRES_PASSWORD and firewall this port.
      # Override the host port with DB_PORT in .env if 5432 is already taken.
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # <service name="backend"> FastAPI. Auto-creates tables + seeds demo data on boot. </service>
  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # If DATABASE_URL is set in .env it wins; otherwise it points at the bundled db.
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-crm}:${POSTGRES_PASSWORD:-change-this-db-password}@db:5432/${POSTGRES_DB:-interio_crm}?sslmode=disable}
      JWT_SECRET: ${JWT_SECRET:-please-change-this-long-random-secret}
      CORS_ORIGINS: "*"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@interiojunction.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-interio2026}
      DEFAULT_USER_PASSWORD: ${DEFAULT_USER_PASSWORD:-interio2026}
      # Transactional email (notifications + password-reset OTP). Leave unset to
      # run on the dev fallback (the OTP is written to the backend logs). Set
      # these in .env to deliver real email — e.g. your interiojunction.com mailbox.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SENDER_EMAIL: ${SENDER_EMAIL:-}
      SENDER_NAME: ${SENDER_NAME:-Interio Junction}
      # --- Security enforcement --------------------------------------------
      # All OFF/empty by default so the one-command demo still runs; turn each
      # on in .env for production. Full reference: docs/security/SECRETS.md and
      # DEPLOYMENT.md §"Turn on the security features".
      #
      # Staff passkeys (WebAuthn). Point these at your COMPANY-app host; passkeys
      # require HTTPS (a domain + cert), so leave empty until you have one.
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-}
      WEBAUTHN_ORIGIN: ${WEBAUTHN_ORIGIN:-}
      WEBAUTHN_RP_NAME: ${WEBAUTHN_RP_NAME:-Interio Junction}
      # Fresh second factor on sensitive staff actions (enable AFTER staff enrol MFA).
      STEP_UP_ENABLED: ${STEP_UP_ENABLED:-0}
      # Customer biometric confirmation on accept-estimate / approve-design.
      CLIENT_STEP_UP_ENABLED: ${CLIENT_STEP_UP_ENABLED:-0}
      # Field-level PII encryption (base64 32-byte key; run migrate_pii.py after enabling).
      PII_ENCRYPTION_KEY: ${PII_ENCRYPTION_KEY:-}
      # Alert when one staff list read returns >= this many PII records.
      BULK_READ_ALERT_THRESHOLD: ${BULK_READ_ALERT_THRESHOLD:-100}
      # Razorpay signed webhook + large-payment step-up (set when the gateway is live).
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
      PAYMENT_STEP_UP_THRESHOLD: ${PAYMENT_STEP_UP_THRESHOLD:-0}
      # DEMO login for the customer portal — NON-PRODUCTION walkthroughs only.
      # Set BOTH to let one fixed number+code open the portal without an SMS
      # gateway. Scoped to this ONE number (not a universal bypass) and auto-
      # disabled when APP_ENV=production. Leave EMPTY for real customers. Seed the
      # demo data once with:  docker compose exec backend python seed_demo_customer.py
      CLIENT_DEMO_PHONE: ${CLIENT_DEMO_PHONE:-}
      CLIENT_DEMO_OTP: ${CLIENT_DEMO_OTP:-}
    expose:
      - "8000"

  # <service name="frontend"> COMPANY app: Nginx serving the staff CRM + proxying
  #   /api -> backend. Staff sign in with email + password. </service>
  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_BACKEND_URL: ""   # same-origin; nginx proxies /api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # Override with WEB_PORT in .env (e.g. WEB_PORT=8080) if port 80 is already
      # in use on your server (for example by an existing Traefik/Nginx proxy).
      - "${WEB_PORT:-80}:80"

  # <service name="client-portal"> CUSTOMER app: a SEPARATE web application for
  #   clients, on the SAME server. Customers sign in with phone + OTP (never a
  #   password) and only ever reach the /api/client/* BFF. Its own build, its own
  #   Nginx, its own host port — talks to the SAME shared backend + database.
  #   Default URL: http://YOUR_SERVER_IP:8080/  (override with CLIENT_WEB_PORT).
  #   To give it a clean address, point a subdomain (e.g. portal.yourdomain.com)
  #   at this port from your reverse proxy — see DEPLOYMENT.md. </service>
  client-portal:
    build:
      context: ./client-portal
      args:
        REACT_APP_BACKEND_URL: ""   # same-origin; nginx proxies /api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${CLIENT_WEB_PORT:-8080}:80"

volumes:
  pgdata:
