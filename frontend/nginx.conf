# <nginx>
#   Serves the built React app AND reverse-proxies /api/* to the backend
#   container. Because the API is same-origin (/api), the browser never hits
#   CORS and the frontend needs no hard-coded backend URL.
# </nginx>
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API calls -> backend service on the internal Docker network.
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 30m;   # allow lead-sheet / document uploads
    }

    # Single-page app: every other path falls back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
