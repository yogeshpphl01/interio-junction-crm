name: security-ci

# Static application security testing (SAST) + dependency vulnerability scanning
# for the backend (P1-14). Secret scanning runs separately in secret-scan.yml
# (gitleaks). Together these give CI-time coverage of CWE Top 25 code smells,
# known-vulnerable dependencies, and leaked credentials.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sast:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install bandit
      # Medium severity + medium confidence: high-signal only (command injection,
      # weak crypto, insecure deserialization, ...). The Low/Low heuristics (SQL
      # built in the schema-driven asyncpg shim — identifiers quoted, values
      # parameterized; "password" field-name literals; best-effort try/except) are
      # intentionally below this bar and are covered elsewhere (gitleaks for real
      # secrets). A NEW medium+ finding fails the build.
      - name: bandit
        working-directory: backend
        run: bandit -r . -x ./.venv,./tests --severity-level medium --confidence-level medium

  dependencies:
    name: Dependency scan (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pip-audit
      # Fails on any known-vulnerable dependency. (The earlier starlette CVEs
      # were cleared by upgrading to fastapi 0.139 / starlette 1.3.1, so there is
      # no ignore list — a new CVE or a new vulnerable package fails the build.)
      - name: pip-audit
        working-directory: backend
        run: pip-audit -r requirements-runtime.txt

  authz:
    name: AuthZ tests (BOLA/BFLA/dual-BFF)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ijtest
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install
        working-directory: backend
        run: pip install -r requirements-runtime.txt httpx
      - name: run authZ suite
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ijtest
          JWT_SECRET: ci-authz-secret-32-chars-minimum-length-xx
          RUN_MIGRATIONS: "1"
          APP_ENV: dev
        run: python tests/test_authz.py

  semgrep:
    name: SAST (semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install semgrep
      # Curated offline rules (run anywhere) + the public OWASP/python packs
      # (available on the runner's network). --error fails the build on findings.
      - name: semgrep (local rules)
        run: semgrep --config .semgrep/ij-rules.yml --exclude .venv --exclude tests --metrics off --error backend
      - name: semgrep (registry packs)
        continue-on-error: true   # advisory: registry availability varies
        run: semgrep --config p/python --config p/security-audit --exclude .venv --exclude tests --severity ERROR --metrics off --error backend

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pip-audit
      - name: generate SBOM
        working-directory: backend
        run: pip-audit -r requirements-runtime.txt --format cyclonedx-json -o sbom.cyclonedx.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: backend/sbom.cyclonedx.json

  flutter-deps:
    name: Flutter dependency scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      # Resolve lockfiles and flag outdated / vulnerable packages. `dart pub
      # outdated` is the always-available audit. (osv-scanner was dropped: the
      # floating `google/osv-scanner-action@v1` tag no longer resolves and fails
      # the job at action-resolution time, before continue-on-error can apply. It
      # can be re-added later pinned to a specific released tag or commit SHA.)
      - name: resolve + audit each app
        run: |
          for app in mobile/apps/client_app mobile/apps/company_app mobile/packages/ij_core; do
            echo "== $app =="
            (cd "$app" && flutter pub get && dart pub outdated || true)
          done
